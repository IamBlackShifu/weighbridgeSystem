<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Weighbridge Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <section class="auth-view">
    <div class="auth-panel">
      <div class="brand-block auth-brand">
        <div class="brand-mark">WB</div>
        <div>
          <p class="eyebrow">Operations Console</p>
          <h1>Weighbridge</h1>
          <p class="brand-copy">Gatehouse login before the shift workspace opens.</p>
        </div>
      </div>

      <article class="card hero-card login-card auth-card">
        <div class="card-head">
          <div>
            <p class="eyebrow">Start shift</p>
            <h2>Gatehouse Login</h2>
            <p class="section-copy">Sign in to open the protected weighbridge workspace.</p>
          </div>
          <div class="hero-badges">
            <span class="badge ok">Session gated</span>
            <span class="badge">Touch friendly</span>
          </div>
        </div>
        <form id="loginForm" class="grid2">
          <label>Operator<input id="loginOperator" value="Operator A"></label>
          <label>Shift<select id="loginShift"><option>Morning</option><option>Afternoon</option><option>Night</option></select></label>
          <label>Bridge<select id="loginBridge"><option>B1</option><option>B2</option></select></label>
          <label>Workstation<select id="loginWorkstation"><option>Gatehouse 1</option><option>Gatehouse 2</option></select></label>
          <div class="action-row">
            <button id="startSession" class="btn primary" type="submit">Start Duty Session</button>
          </div>
        </form>
      </article>
    </div>
  </section>

  <script src="login.js"></script>
</body>
</html>
